<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlashCard</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #12121c;
            color: #e8e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        button {
            cursor: pointer;
            font: inherit;
            border: none;
            background: none;
        }
        input,
        textarea,
        select {
            font: inherit;
            border: 1px solid #2d2d44;
            border-radius: 8px;
            padding: 10px 14px;
            background: #1e1e32;
            color: #e8e8f0;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #7c7cf8;
            box-shadow: 0 0 0 3px rgba(124, 124, 248, 0.25);
        }
        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #2d2d44;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #5a5a7a;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #7c7cf8;
        }

        /* ===== LAYOUT ===== */
        .app-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 14px 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #2d2d44;
        }
        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .app-header .brand h1 {
            font-size: 20px;
            font-weight: 700;
            color: #f0f0ff;
        }
        .app-header .brand h1 span {
            background: #7c7cf8;
            color: #12121c;
            font-size: 13px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 20px;
            margin-left: 6px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: #7c7cf8;
            color: #12121c;
        }
        .btn-primary:hover {
            background: #6b6bf0;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(124, 124, 248, 0.35);
        }
        .btn-secondary {
            background: #2d2d44;
            color: #d0d0e0;
        }
        .btn-secondary:hover {
            background: #3d3d5a;
        }
        .btn-success {
            background: #4cd964;
            color: #12121c;
        }
        .btn-success:hover {
            background: #3bcb5a;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(76, 217, 100, 0.35);
        }
        .btn-danger {
            background: #ff5e5e;
            color: #12121c;
        }
        .btn-danger:hover {
            background: #f04a4a;
        }
        .btn-outline {
            background: transparent;
            border-color: #2d2d44;
            color: #c0c0d0;
        }
        .btn-outline:hover {
            background: #1a1a2e;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 8px;
        }
        .btn-xs {
            padding: 3px 8px;
            font-size: 11px;
            border-radius: 6px;
        }
        .btn-back {
            background: #2d2d44;
            color: #c0c0d0;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-back:hover {
            background: #3d3d5a;
        }
        .btn-speak {
            background: transparent;
            color: #7c7cf8;
            padding: 2px 6px;
            border-radius: 50%;
            font-size: 14px;
            border: 1px solid #2d2d44;
            transition: all 0.2s;
            line-height: 1;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-speak:hover {
            background: #2d2d44;
            color: #b0b0ff;
            transform: scale(1.1);
        }
        .btn-speak-sm {
            font-size: 12px;
            width: 20px;
            height: 20px;
            padding: 1px 4px;
        }
        .btn-toggle {
            background: #2d2d44;
            color: #d0d0e0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #3d3d5a;
        }
        .btn-toggle:hover {
            background: #3d3d5a;
        }
        .btn-toggle.active {
            background: #7c7cf8;
            color: #12121c;
            border-color: #7c7cf8;
        }
        .btn-fav {
            font-size: 18px;
            padding: 0 4px;
            transition: transform 0.2s;
            color: #8888a8;
        }
        .btn-fav.active {
            color: #ffd700;
            text-shadow: 0 0 8px #ffd70055;
        }
        .btn-fav:hover {
            transform: scale(1.2);
        }
        .btn-move {
            font-size: 14px;
            padding: 0 6px;
            color: #8888a8;
            transition: color 0.2s;
        }
        .btn-move:hover {
            color: #f0f0ff;
        }

        /* ===== CARDS ===== */
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            border: 1px solid #2d2d44;
            transition: box-shadow 0.2s;
        }
        .card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #2d2d44;
        }
        .card-header h2 {
            font-size: 18px;
            font-weight: 700;
        }
        .card-header h2 small {
            font-weight: 400;
            font-size: 14px;
            color: #8888a8;
            margin-left: 8px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        /* ===== SET CARD ===== */
        .set-card {
            background: #16162a;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #2d2d44;
            transition: all 0.2s;
            position: relative;
        }
        .set-card:hover {
            border-color: #4a4a6a;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }
        .set-card h3 {
            font-size: 17px;
            font-weight: 700;
            color: #f0f0ff;
            margin-bottom: 4px;
        }
        .set-card .lang-tags {
            display: flex;
            gap: 8px;
            margin: 6px 0 12px;
            flex-wrap: wrap;
        }
        .set-card .lang-tags span {
            background: #2d2d44;
            color: #b0b0f0;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .set-card .card-count {
            font-size: 13px;
            color: #8888a8;
            margin-bottom: 14px;
        }
        .set-card .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .set-card .actions .btn {
            font-size: 12px;
            padding: 6px 14px;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #8888a8;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state h3 {
            color: #d0d0e0;
            font-size: 18px;
            margin-bottom: 6px;
        }
        .empty-state p {
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto 16px;
        }

        /* ===== SET DETAIL ===== */
        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .detail-header .left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .detail-header .left h2 {
            font-size: 22px;
            font-weight: 700;
            color: #f0f0ff;
        }
        .detail-header .left .lang-badge {
            background: #2d2d44;
            color: #b0b0f0;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 20px;
        }
        .detail-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* ===== WORD GRID (thay thế table) ===== */
        .word-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .word-item {
            background: #16162a;
            border: 1px solid #2d2d44;
            border-radius: 12px;
            padding: 14px 18px;
            display: grid;
            grid-template-columns: 40px 1.2fr 1.2fr 1.5fr 1.5fr 140px;
            gap: 12px;
            align-items: center;
            transition: all 0.2s;
        }
        .word-item:hover {
            border-color: #4a4a6a;
            background: #1a1a32;
        }

        .word-item .col-fav {
            text-align: center;
        }
        .word-item .col-word,
        .word-item .col-meaning,
        .word-item .col-example,
        .word-item .col-example-trans {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .word-item .col-word .text-content,
        .word-item .col-meaning .text-content,
        .word-item .col-example .text-content,
        .word-item .col-example-trans .text-content {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .word-item .col-example .text-content,
        .word-item .col-example-trans .text-content {
            color: #a0a0c0;
            font-style: italic;
        }
        .word-item .col-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
        }
        .word-item .empty-cell {
            color: #666688;
            font-style: italic;
            font-size: 12px;
        }

        /* ===== ADD CARD FORM ===== */
        .add-card-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #2d2d44;
        }
        .add-card-form .full-width {
            grid-column: 1 / -1;
        }
        .add-card-form label {
            font-size: 13px;
            font-weight: 600;
            color: #b0b0d0;
            display: block;
            margin-bottom: 4px;
        }
        .add-card-form .form-row {
            display: flex;
            flex-direction: column;
        }
        .add-card-form .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        /* ===== STUDY MODE ===== */
        .study-container {
            max-width: 720px;
            margin: 0 auto;
        }
        .study-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            margin-bottom: 24px;
            padding: 20px;
            background: #16162a;
            border-radius: 14px;
            border: 1px solid #2d2d44;
        }
        .study-controls .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 120px;
        }
        .study-controls .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #b0b0d0;
        }
        .study-controls .control-group select,
        .study-controls .control-group input {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #2d2d44;
            background: #1a1a2e;
            color: #e8e8f0;
        }
        .study-controls .btn {
            padding: 8px 24px;
            align-self: flex-end;
        }

        /* ===== FLASHCARD with improved animation ===== */
        .flashcard-wrapper {
            perspective: 1000px;
            margin: 16px 0 24px;
            cursor: pointer;
        }
        .flashcard {
            position: relative;
            width: 100%;
            min-height: 260px;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        .flashcard.flipped {
            transform: rotateY(180deg) scale(1.02);
            box-shadow: 0 12px 40px rgba(124, 124, 248, 0.15);
        }
        .flashcard-face {
            position: absolute;
            width: 100%;
            min-height: 260px;
            backface-visibility: hidden;
            border-radius: 18px;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid #2d2d44;
            background: #1a1a2e;
            transition: box-shadow 0.3s ease;
        }
        .flashcard-front {
            transform: rotateY(0deg);
        }
        .flashcard-back {
            transform: rotateY(180deg);
            background: #16162a;
        }
        .flashcard-face .card-label {
            font-size: 12px;
            font-weight: 600;
            color: #8888a8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .flashcard-face .main-text {
            font-size: 28px;
            font-weight: 700;
            color: #f0f0ff;
            line-height: 1.4;
            word-break: break-word;
        }
        .flashcard-face .sub-text {
            font-size: 18px;
            color: #c0c0d0;
            margin-top: 8px;
            line-height: 1.5;
        }
        .flashcard-face .example-area {
            margin-top: 16px;
            width: 100%;
            max-width: 90%;
            padding: 12px 16px;
            background: #12121c;
            border-radius: 10px;
            border: 1px solid #2d2d44;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .flashcard-face .example-area.show {
            display: flex;
        }
        .flashcard-face .example-area .ex-text {
            font-size: 15px;
            color: #a0a0c0;
            font-style: italic;
        }
        .flashcard-face .example-area .ex-trans {
            font-size: 14px;
            color: #b0b0d0;
        }
        .flashcard-face .hint {
            font-size: 13px;
            color: #666688;
            margin-top: 12px;
        }
        .flashcard-face .speak-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .flashcard-face .speak-row .btn-speak {
            font-size: 16px;
            padding: 2px 8px;
        }

        .flashcard-progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 12px 0 20px;
        }
        .flashcard-progress .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2d2d44;
            transition: background 0.3s;
        }
        .flashcard-progress .dot.active {
            background: #7c7cf8;
            box-shadow: 0 0 8px #7c7cf8;
        }
        .flashcard-progress .dot.done {
            background: #4cd964;
        }
        .flashcard-progress .dot.wrong {
            background: #ff5e5e;
        }

        /* ===== STUDY ACTIONS ===== */
        .study-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 16px 0 8px;
        }
        .study-actions .btn {
            padding: 8px 20px;
            font-size: 14px;
            min-width: 100px;
            justify-content: center;
        }
        .study-actions-bottom {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        .study-nav {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .study-nav .btn {
            padding: 8px 22px;
            font-size: 14px;
            min-width: 80px;
            justify-content: center;
        }
        .study-counter {
            text-align: center;
            font-size: 14px;
            color: #8888a8;
            margin-bottom: 8px;
        }

        /* ===== STUDY SUMMARY (Batch) ===== */
        .study-summary {
            text-align: center;
            padding: 30px 20px;
        }
        .study-summary .big-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        .study-summary h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #f0f0ff;
        }
        .study-summary .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0 30px;
            flex-wrap: wrap;
        }
        .study-summary .stat-item {
            background: #16162a;
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid #2d2d44;
            min-width: 100px;
        }
        .study-summary .stat-item .number {
            font-size: 32px;
            font-weight: 700;
        }
        .study-summary .stat-item .label {
            font-size: 14px;
            color: #8888a8;
            margin-top: 4px;
        }
        .study-summary .stat-item.learned .number {
            color: #4cd964;
        }
        .study-summary .stat-item.not-learned .number {
            color: #ff5e5e;
        }
        .study-summary .stat-item.remaining .number {
            color: #7c7cf8;
        }
        .study-summary .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.hidden {
            display: none;
        }
        .modal {
            background: #1a1a2e;
            border-radius: 20px;
            max-width: 580px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px 32px;
            animation: slideUp 0.25s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid #2d2d44;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2d2d44;
        }
        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #f0f0ff;
        }
        .modal-close {
            font-size: 24px;
            color: #8888a8;
            padding: 0 6px;
            transition: color 0.2s;
            background: none;
            border: none;
            cursor: pointer;
        }
        .modal-close:hover {
            color: #ff5e5e;
        }
        .modal .form-group {
            margin-bottom: 16px;
        }
        .modal .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #b0b0d0;
            margin-bottom: 4px;
        }
        .modal .form-group .hint {
            font-size: 12px;
            color: #666688;
            margin-top: 2px;
        }
        .modal .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #2d2d44;
            justify-content: flex-end;
        }
        .modal select {
            appearance: auto;
        }

        /* ===== FILE DROP ZONE ===== */
        .drop-zone {
            border: 2px dashed #2d2d44;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s;
            background: #12121c;
            cursor: pointer;
        }
        .drop-zone:hover {
            border-color: #4a4a6a;
            background: #1a1a2e;
        }
        .drop-zone.dragover {
            border-color: #7c7cf8;
            background: #1a1a3a;
            box-shadow: 0 0 20px rgba(124, 124, 248, 0.1);
        }
        .drop-zone .icon {
            font-size: 40px;
            margin-bottom: 8px;
        }
        .drop-zone p {
            color: #8888a8;
            font-size: 14px;
        }
        .drop-zone .btn {
            margin-top: 12px;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 380px;
        }
        .toast {
            background: #1a1a2e;
            color: #f0f0ff;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #2d2d44;
        }
        .toast.success {
            background: #1a3a2a;
            border-color: #4cd964;
        }
        .toast.error {
            background: #3a1a1a;
            border-color: #ff5e5e;
        }
        .toast.info {
            background: #1a2a3a;
            border-color: #7c7cf8;
        }
        .toast .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            color: #8888a8;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
        }
        .toast .toast-close:hover {
            color: #f0f0ff;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .word-item {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 16px;
            }
            .word-item .col-fav {
                text-align: left;
                grid-row: 1;
            }
            .word-item .col-word {
                grid-row: 2;
            }
            .word-item .col-meaning {
                grid-row: 3;
            }
            .word-item .col-example {
                grid-row: 4;
            }
            .word-item .col-example-trans {
                grid-row: 5;
            }
            .word-item .col-actions {
                grid-row: 6;
                justify-content: flex-start;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 700px) {
            .app-header {
                padding: 14px 18px;
            }
            .app-header .brand h1 {
                font-size: 18px;
            }
            .card {
                padding: 16px;
            }
            .modal {
                padding: 20px 16px;
            }
            .modal .form-row-2 {
                grid-template-columns: 1fr;
            }
            .add-card-form {
                grid-template-columns: 1fr;
            }
            .add-card-form .full-width {
                grid-column: 1;
            }
            .detail-header .left h2 {
                font-size: 18px;
            }
            .flashcard-face .main-text {
                font-size: 22px;
            }
            .study-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .study-controls .btn {
                align-self: stretch;
            }
            .set-card .actions {
                flex-wrap: wrap;
            }
            .flashcard-face {
                min-height: 200px;
                padding: 20px 16px;
            }
            .flashcard {
                min-height: 200px;
            }
            .study-nav .btn {
                min-width: 60px;
                padding: 6px 14px;
                font-size: 13px;
            }
            .study-summary .stats {
                gap: 16px;
            }
            .study-actions .btn {
                min-width: 70px;
                padding: 6px 14px;
                font-size: 13px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .app-header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {

            }

                flex-wrap: wrap;
            }
            .detail-actions .btn {
                flex: 1;
                justify-content: center;
            }
        }

        let currentLanguage = 'en';

        function t(key) {
            return LANG[currentLanguage][key] || key;
        }

        function toggleLanguage() {
            currentLanguage = (currentLanguage === 'en') ? 'vi' : 'en';
            const btn = document.getElementById('langToggle');
            btn.textContent = currentLanguage === 'en' ? '🇻🇳 Tiếng Việt' : '🇬🇧 English';
            render();
        }

        // ============================================================
        //  DATA LAYER
        // ============================================================
        const STORAGE_KEY = 'flashcard_app_data';

        function getDefaultData() {
            return { sets: [] };
        }

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return getDefaultData();
                const data = JSON.parse(raw);
                if (!data.sets || !Array.isArray(data.sets)) return getDefaultData();
                for (const set of data.sets) {
                    if (set.cards) {
                        for (const card of set.cards) {
                            if (card.favorite === undefined) card.favorite = false;
                        }
                    }
                }
                return data;
            } catch {
                return getDefaultData();
            }
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function generateId() {
            return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
        }

        // ============================================================
        //  LANGUAGE OPTIONS
        // ============================================================
        const LANGUAGE_OPTIONS = [
            { value: 'english', label: 'English' },
            { value: 'vietnamese', label: 'Tiếng Việt' },
            { value: 'japanese', label: '日本語' },
            { value: 'chinese', label: '中文' },
            { value: 'korean', label: '한국어' },
            { value: 'spanish', label: 'Español' },
            { value: 'french', label: 'Français' },
            { value: 'german', label: 'Deutsch' },
        ];

        function getLangCode(langValue) {
            const map = {
                'english': 'en-US',
                'vietnamese': 'vi-VN',
                'japanese': 'ja-JP',
                'chinese': 'zh-CN',
                'korean': 'ko-KR',
                'spanish': 'es-ES',
                'french': 'fr-FR',
                'german': 'de-DE'
            };
            return map[langValue] || 'en-US';
        }

        function getLanguageLabel(value) {
            const opt = LANGUAGE_OPTIONS.find(o => o.value === value);
            return opt ? opt.label : value;
        }

        function renderLanguageOptions(selected) {
            return LANGUAGE_OPTIONS.map(o =>
                `<option value="${o.value}" ${o.value === selected ? 'selected' : ''}>${o.label}</option>`
            ).join('');
        }

        // ============================================================
        //  TTS
        // ============================================================
        function speakText(text, langCode) {
            if (!window.speechSynthesis) {
                showToast('TTS not supported.', 'error');
                return;
            }
            if (!text || text.trim() === '') return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langCode;
            utterance.rate = 0.9;
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        }

        // ============================================================
        //  TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                if (toast.parentElement) toast.remove();
            }, 4000);
        }

        // ============================================================
        //  MODAL
        // ============================================================
        function openModal(html) {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            content.innerHTML = html;
            overlay.classList.remove('hidden');
            overlay.onclick = (e) => {
                if (e.target === overlay) closeModal();
            };
            document.addEventListener('keydown', handleModalEscape);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.removeEventListener('keydown', handleModalEscape);
        }

        function handleModalEscape(e) {
            if (e.key === 'Escape') closeModal();
        }

        // ============================================================
        //  EXPORT ALL DATA
        // ============================================================
        function exportAllData() {
            const data = loadData();
            if (data.sets.length === 0) {
                showToast('No data to export.', 'error');
                return;
            }
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `flashcard_data_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast(`Exported ${data.sets.length} sets.`, 'success');
        }

        // ============================================================
        //  IMPORT ALL DATA
        // ============================================================
        function openImportAllModal() {
            openModal(`
                <div class="modal-header">
                    <h2>${t('importAll')}</h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="form-group">
                    <label>${t('importAllDesc')}</label>
                    <div class="drop-zone" id="importDropZone">
                        <div class="icon">📂</div>
                        <p>${t('dropOrClick')}</p>
                        <button class="btn btn-primary" onclick="document.getElementById('importFileInput').click()">${t('chooseFile')}</button>
                        <input type="file" id="importFileInput" accept=".json" style="display:none" />
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
                </div>
            `);

            // Setup drag and drop
            const dropZone = document.getElementById('importDropZone');
            const fileInput = document.getElementById('importFileInput');

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleImportFile(files[0]);
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (fileInput.files.length > 0) {
                    handleImportFile(fileInput.files[0]);
                }
            });
        }

        function handleImportFile(file) {
            if (!file.name.endsWith('.json')) {
                showToast('Please select a JSON file.', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.sets || !Array.isArray(data.sets)) {
                        showToast(t('importFail'), 'error');
                        return;
                    }
                    // Validate data structure
                    let valid = true;
                    for (const set of data.sets) {
                        if (!set.id || !set.name || !set.sourceLang || !set.targetLang) {
                            valid = false;
                            break;
                        }
                        if (set.cards && Array.isArray(set.cards)) {
                            for (const card of set.cards) {
                                if (!card.id || !card.word || !card.meaning) {
                                    valid = false;
                                    break;
                                }
                            }
                        }
                        if (!valid) break;
                    }
                    if (!valid) {
                        showToast(t('importFail'), 'error');
                        return;
                    }
                    // Save data
                    saveData(data);
                    closeModal();
                    showToast(t('importSuccess').replace('{count}', data.sets.length), 'success');
                    render();
                } catch (err) {
                    showToast(t('importFail'), 'error');
                }
            };
            reader.readAsText(file);
        }

        // ============================================================
        //  RENDER ENGINE
        // ============================================================
        let currentView = 'dashboard';
        let currentSetId = null;
        let studyState = null;

        function render() {
            const container = document.getElementById('mainContent');
            if (currentView === 'dashboard') {
                container.innerHTML = renderDashboard();
                attachDashboardEvents();
            } else if (currentView === 'detail') {
                container.innerHTML = renderSetDetail(currentSetId);
                attachDetailEvents();
            } else if (currentView === 'study') {
                container.innerHTML = renderStudy();
                attachStudyEvents();
            }
            document.getElementById('btnCreateSet').innerHTML = t('addNewCardSet');
        }

        // ============================================================
        //  DASHBOARD
        // ============================================================
        function renderDashboard() {
            const data = loadData();
            const sets = data.sets;
            if (sets.length === 0) {
                return `
                    <div class="card">
                        <div class="empty-state">
                            <div class="icon">📖</div>
                            <h3>${t('noCards')}</h3>
                            <p>${currentLanguage === 'en' ? 'Create your first set to start learning!' : 'Tạo bộ thẻ đầu tiên để bắt đầu học!'}</p>
                            <button class="btn btn-primary" onclick="openCreateSetModal()">${t('createSet')}</button>
                        </div>
                    </div>
                `;
            }
            let html = `<div class="card-grid">`;
            for (const set of sets) {
                const count = set.cards ? set.cards.length : 0;
                html += `
                    <div class="set-card">
                        <h3>${escapeHtml(set.name)}</h3>
                        <div class="lang-tags">
                            <span>${escapeHtml(getLanguageLabel(set.sourceLang))}</span>
                            <span>→</span>
                            <span>${escapeHtml(getLanguageLabel(set.targetLang))}</span>
                        </div>
                        <div class="card-count">${count} ${t('remainingCards')}</div>
                        <div class="actions">

        // ============================================================
        //  STUDY
        // ============================================================
        function renderStudy() {
            if (!studyState) {
                return `<div class="card"><p>${t('noCards')}</p><button class="btn btn-back" onclick="goDashboard()">${t('back')}</button></div>`;
            }

            const {
                allCards,
                currentBatch,
                batchSize,
                learnedStatus,
                totalBatches,
                finished,
                showExample,
                flipped,
                setId,
                meaningFirst
            } = studyState;

            if (finished) {
                const totalLearned = learnedStatus.filter(v => v === true).length;
                const totalNotLearned = learnedStatus.filter(v => v === false).length;
                const totalRemaining = allCards.length - totalLearned - totalNotLearned;
                return `
                    <div class="card study-container">
                        <div class="study-summary">
                            <div class="big-icon">🎉</div>
                            <h2>${t('finalSummary')}</h2>
                            <div class="stats">
                                <div class="stat-item learned">
                                    <div class="number">${totalLearned}</div>
                                    <div class="label">${t('learned')}</div>
                                </div>
                                <div class="stat-item not-learned">
                                    <div class="number">${totalNotLearned}</div>
                                    <div class="label">${t('notLearned')}</div>
                                </div>
                                <div class="stat-item remaining">
                                    <div class="number">${totalRemaining}</div>
                                    <div class="label">${t('remaining')}</div>
                                </div>
                            </div>
                            <div class="actions">
                                <button class="btn btn-success" onclick="restartStudy()">${t('repeat')}</button>
                                <button class="btn btn-secondary" onclick="goDashboard()">${t('back')}</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            const start = currentBatch * batchSize;
            const end = Math.min(start + batchSize, allCards.length);
            const batchCards = allCards.slice(start, end);
            const batchLearned = learnedStatus.slice(start, end);
            const allMarked = batchLearned.every(v => v !== undefined);

            if (allMarked && currentBatch < totalBatches) {
                const learnedInBatch = batchLearned.filter(v => v === true).length;
                const notLearnedInBatch = batchLearned.filter(v => v === false).length;
                const remainingTotal = allCards.length - learnedStatus.filter(v => v !== undefined).length;
                const isLastBatch = (currentBatch === totalBatches - 1);
                return `
                    <div class="card study-container">
                        <div class="study-summary">
                            <div class="big-icon">📊</div>
                            <h2>${t('batchSummary')}</h2>
                            <div class="stats">
                                <div class="stat-item learned">
                                    <div class="number">${learnedInBatch}</div>
                                    <div class="label">${t('learned')}</div>
                                </div>
                                <div class="stat-item not-learned">
                                    <div class="number">${notLearnedInBatch}</div>
                                    <div class="label">${t('notLearned')}</div>
                                </div>
                                <div class="stat-item remaining">
                                    <div class="number">${remainingTotal}</div>
                                    <div class="label">${t('remaining')}</div>
                                </div>
                            </div>
                            <div class="actions">
                                <button class="btn btn-secondary" onclick="retakeBatch()">${t('retakeBatch')}</button>
                                ${!isLastBatch ? `<button class="btn btn-primary" onclick="nextBatch()">${t('continue')}</button>` : `<button class="btn btn-success" onclick="finishStudy()">${t('done')}</button>`}
                                <button class="btn btn-secondary" onclick="exitStudy()">${t('back')}</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            const currentIndexInBatch = studyState.currentIndexInBatch || 0;
            const card = batchCards[currentIndexInBatch];
            if (!card) {
                return `<div class="card"><p>Error loading card.</p></div>`;
            }

            const isFlipped = flipped || false;
            const progress = ((currentBatch * batchSize + currentIndexInBatch + 1) / allCards.length * 100).toFixed(0);

            let frontLabel, backLabel, frontMain, backMain, frontSpeakCode, backSpeakCode;
            if (meaningFirst) {
                frontLabel = t('frontLabelMeaning');
                frontMain = card.meaning;
                backLabel = t('backLabelWord');
                backMain = card.word;
                frontSpeakCode = getTargetLangCode(setId);
                backSpeakCode = getLangCodeForSet(setId);
            } else {
                frontLabel = t('frontLabelWord');
                frontMain = card.word;
                backLabel = t('backLabelMeaning');
                backMain = card.meaning;
                frontSpeakCode = getLangCodeForSet(setId);
                backSpeakCode = getTargetLangCode(setId);
            }

            const exampleText = card.example || '';
            const exampleTransText = card.exampleTranslation || '';
            const exampleSpeakCode = getLangCodeForSet(setId);
            const exampleTransSpeakCode = getTargetLangCode(setId);

            const exampleHtml = `
                <div class="example-area ${showExample ? 'show' : ''}">
                    ${exampleText ? `<div class="ex-text">📝 ${escapeHtml(exampleText)} <button class="btn-speak" onclick="event.stopPropagation(); speakText('${escapeHtml(exampleText)}', '${exampleSpeakCode}')" title="${t('speak')}">${t('speak')}</button></div>` : ''}
                    ${exampleTransText ? `<div class="ex-trans">✏️ ${escapeHtml(exampleTransText)} <button class="btn-speak" onclick="event.stopPropagation(); speakText('${escapeHtml(exampleTransText)}', '${exampleTransSpeakCode}')" title="${t('speak')}">${t('speak')}</button></div>` : ''}
                </div>
            `;

            const frontContent = `
                <div class="card-label">${frontLabel}</div>
                <div style="display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap;">
                    <div class="main-text">${escapeHtml(frontMain)}</div>
                    <button class="btn-speak" onclick="event.stopPropagation(); speakText('${escapeHtml(frontMain)}', '${frontSpeakCode}')" title="${t('speak')}">${t('speak')}</button>
                </div>
                <div style="margin-top:8px; display:flex; gap:8px; justify-content:center;">
                    <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); toggleExample()">${showExample ? t('hideExample') : t('showExample')}</button>
                </div>
                ${exampleHtml}
                <div class="hint">${t('flipHint')}</div>
            `;

            const backContent = `
                <div class="card-label">${backLabel}</div>
                <div style="display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap;">
                    <div class="main-text" style="font-size:24px;">${escapeHtml(backMain)}</div>
                    <button class="btn-speak" onclick="event.stopPropagation(); speakText('${escapeHtml(backMain)}', '${backSpeakCode}')" title="${t('speak')}">${t('speak')}</button>
                </div>
                <div style="margin-top:8px; display:flex; gap:8px; justify-content:center;">
                    <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); toggleExample()">${showExample ? t('hideExample') : t('showExample')}</button>
                </div>
                ${exampleHtml}
                <div class="hint">${t('flipHint')}</div>
            `;

            let dots = '';
            for (let i = 0; i < allCards.length; i++) {
                let cls = 'dot';
                if (i === start + currentIndexInBatch) cls += ' active';
                else if (learnedStatus[i] === true) cls += ' done';
                else if (learnedStatus[i] === false) cls += ' wrong';
                dots += `<span class="${cls}"></span>`;
            }

            const isMarked = learnedStatus[start + currentIndexInBatch] !== undefined;
            let markButtons = '';
            if (isMarked) {
                const status = learnedStatus[start + currentIndexInBatch];
                markButtons = `
                    <span style="color:#8888a8; margin-right:8px;">${status ? '✅' : '❌'} ${status ? t('learned') : t('notLearned')}</span>
                    <button class="btn btn-secondary btn-sm" onclick="unmarkCard()">${t('unmark')}</button>
                `;
            } else {
                markButtons = `
                    <button class="btn btn-danger btn-sm" onclick="markCard(false)">${t('markNotLearned')}</button>
                    <button class="btn btn-success btn-sm" onclick="markCard(true)">${t('markLearned')}</button>
                `;
            }

            const isFirst = (currentBatch === 0 && currentIndexInBatch === 0);
            const isLast = (currentBatch === totalBatches - 1 && currentIndexInBatch === batchCards.length - 1);

            return `
                <div class="study-container">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
                        <button class="btn-back" onclick="exitStudy()">${t('back')}</button>
                        <span style="font-size:14px;color:#8888a8;">${t('remainingCards')}: ${allCards.length - learnedStatus.filter(v => v !== undefined).length}</span>
                    </div>

                    <div class="flashcard-wrapper" onclick="flipCard()">
                        <div class="flashcard ${isFlipped ? 'flipped' : ''}">
                            <div class="flashcard-face flashcard-front">${frontContent}</div>
                            <div class="flashcard-face flashcard-back">${backContent}</div>
                        </div>
                    </div>

                    <div class="flashcard-progress">${dots}</div>

                    <div class="study-counter">${(currentBatch * batchSize + currentIndexInBatch + 1)} / ${allCards.length} (${progress}%)</div>

                    <div class="study-actions">
                        ${markButtons}
                    </div>
                    <div class="study-actions-bottom">
                        <button class="btn btn-secondary" onclick="finishBatch()">${t('finishBatch')}</button>
                    </div>

                    <div class="study-nav">
                        <button class="btn btn-secondary" onclick="prevCard()" ${isFirst ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>${t('previous')}</button>
                        <button class="btn btn-primary" onclick="flipCard()">${t('flip')}</button>
                        <button class="btn btn-secondary" onclick="nextCard()" ${isLast ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>${t('next')}</button>
                    </div>
                </div>
            `;
        }

        function attachStudyEvents() {
            document.addEventListener('keydown', handleStudyKeys);
        }

        function handleStudyKeys(e) {
            if (currentView !== 'study') {
                document.removeEventListener('keydown', handleStudyKeys);
                return;
            }
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                if (e.key === ' ') flipCard();
                else nextCard();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            } else if (e.key === 'f' || e.key === 'F') {
                e.preventDefault();
                flipCard();
            }
        }

        // ============================================================
        //  STUDY ACTIONS
        // ============================================================
        function startStudy(setId) {
            const data = loadData();
            const set = data.sets.find(s => s.id === setId);
            if (!set) {
                showToast('Set not found.', 'error');
                return;
            }
            const cards = set.cards || [];
            if (cards.length === 0) {
                showToast('No cards in this set.', 'error');
                return;
            }

            const hasFavorites = cards.some(c => c.favorite);

            openModal(`
                <div class="modal-header">
                    <h2>${t('studyOptions')}</h2>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="form-group">
                    <label>${t('cardCount')}</label>
                    <select id="studyCount">
                        ${[5,6,7,8,9,10].map(n => `<option value="${n}" ${n===5?'selected':''}>${n}</option>`).join('')}
                        <option value="all">${t('all')} (${cards.length})</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>${t('studyMode')}</label>
                    <select id="studyMode">
                        <option value="random">${t('random')}</option>
                        <option value="top-down" selected>${t('topDown')}</option>
                        <option value="bottom-up">${t('bottomUp')}</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>${t('direction')}</label>
                    <select id="studyDirection">
                        <option value="word-first">${t('wordFirst')}</option>
                        <option value="meaning-first" selected>${t('meaningFirst')}</option>
                    </select>
                </div>
                ${hasFavorites ? `
                <div class="form-group" style="display:flex;align-items:center;gap:12px;padding:8px 0;">
                    <input type="checkbox" id="onlyFavorites" style="width:auto;height:20px;accent-color:#7c7cf8;" />
                    <label for="onlyFavorites" style="margin:0;font-weight:600;color:#b0b0d0;">${t('onlyFavorites')}</label>
                </div>
                ` : ''}
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
                    <button class="btn btn-success" onclick="handleStartStudy('${setId}')">${t('startStudy')}</button>
                </div>
            `);
        }

        function handleStartStudy(setId) {
            const countEl = document.getElementById('studyCount');
            const modeEl = document.getElementById('studyMode');
            const directionEl = document.getElementById('studyDirection');
            const onlyFavoritesEl = document.getElementById('onlyFavorites');
            const batchSize = countEl.value === 'all' ? Infinity : parseInt(countEl.value, 10);
            const mode = modeEl.value;
            const meaningFirst = directionEl.value === 'meaning-first';
            const onlyFavorites = onlyFavoritesEl ? onlyFavoritesEl.checked : false;

            const data = loadData();
            const set = data.sets.find(s => s.id === setId);
            if (!set) {
                showToast('Set not found.', 'error');
                closeModal();
                return;
            }

            let cards = [...(set.cards || [])];
            if (cards.length === 0) {
                showToast('No cards.', 'error');
                closeModal();
                return;
            }

            if (onlyFavorites) {
                cards = cards.filter(c => c.favorite);
                if (cards.length === 0) {
                    showToast(t('noFavorites'), 'error');
                    closeModal();
                    return;
                }
            }

            if (mode === 'random') {
                for (let i = cards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [cards[i], cards[j]] = [cards[j], cards[i]];
                }
            } else if (mode === 'bottom-up') {
                cards.reverse();
            }

            const actualBatchSize = Math.min(batchSize, cards.length);
            const totalBatches = Math.ceil(cards.length / actualBatchSize);

            studyState = {
                setId,
                allCards: cards,
                batchSize: actualBatchSize,
                currentBatch: 0,
                currentIndexInBatch: 0,
                learnedStatus: new Array(cards.length).fill(undefined),
                totalBatches,
                finished: false,
                showExample: false,
                flipped: false,
                meaningFirst: meaningFirst,
            };

            closeModal();
            currentView = 'study';
            render();
        }

        function flipCard() {
            if (!studyState || studyState.finished) return;
            studyState.flipped = !studyState.flipped;
            render();
        }

        function toggleExample() {
            if (!studyState) return;
            studyState.showExample = !studyState.showExample;
            render();
        }

        function markCard(value) {
            if (!studyState || studyState.finished) return;
            const idx = studyState.currentBatch * studyState.batchSize + studyState.currentIndexInBatch;
            if (idx >= studyState.learnedStatus.length) return;
            studyState.learnedStatus[idx] = value;
            const start = studyState.currentBatch * studyState.batchSize;
            const end = Math.min(start + studyState.batchSize, studyState.learnedStatus.length);
            const batchLearned = studyState.learnedStatus.slice(start, end);
            const allMarked = batchLearned.every(v => v !== undefined);
            if (allMarked) {
                render();
            } else {
                if (studyState.currentIndexInBatch < batchLearned.length - 1) {
                    studyState.currentIndexInBatch++;
                    studyState.flipped = false;
                    studyState.showExample = false;
                }
                render();
            }
        }

        function unmarkCard() {
            if (!studyState || studyState.finished) return;
            const idx = studyState.currentBatch * studyState.batchSize + studyState.currentIndexInBatch;
            if (idx >= studyState.learnedStatus.length) return;
            studyState.learnedStatus[idx] = undefined;
            render();
        }

        function nextCard() {
            if (!studyState || studyState.finished) return;
            const batchSize = studyState.batchSize;
            const start = studyState.currentBatch * batchSize;
            const batchCards = studyState.allCards.slice(start, start + batchSize);
            if (studyState.currentIndexInBatch < batchCards.length - 1) {
                studyState.currentIndexInBatch++;
                studyState.flipped = false;
                studyState.showExample = false;
                render();
            }
        }

        function prevCard() {
            if (!studyState || studyState.finished) return;
            if (studyState.currentIndexInBatch > 0) {
                studyState.currentIndexInBatch--;
                studyState.flipped = false;
                studyState.showExample = false;
                render();
            }
        }

        function finishBatch() {
            if (!studyState || studyState.finished) return;
            const start = studyState.currentBatch * studyState.batchSize;
            const end = Math.min(start + studyState.batchSize, studyState.learnedStatus.length);
            for (let i = start; i < end; i++) {
                if (studyState.learnedStatus[i] === undefined) {
                    studyState.learnedStatus[i] = false;
                }
            }
            render();
        }

        function nextBatch() {
            if (!studyState) return;
            if (studyState.currentBatch < studyState.totalBatches - 1) {
                studyState.currentBatch++;
                studyState.currentIndexInBatch = 0;
                studyState.flipped = false;
                studyState.showExample = false;
                render();
            } else {
                finishStudy();
            }
        }

        function retakeBatch() {
            if (!studyState) return;
            const start = studyState.currentBatch * studyState.batchSize;
            const end = Math.min(start + studyState.batchSize, studyState.learnedStatus.length);
            for (let i = start; i < end; i++) {
                studyState.learnedStatus[i] = undefined;
            }
            studyState.currentIndexInBatch = 0;
            studyState.flipped = false;
            studyState.showExample = false;
            render();
        }

        function finishStudy() {
            if (!studyState) return;
            for (let i = 0; i < studyState.learnedStatus.length; i++) {
                if (studyState.learnedStatus[i] === undefined) {
                    studyState.learnedStatus[i] = false;
                }
            }
            studyState.finished = true;
            render();
        }

        function restartStudy() {
            if (!studyState) return;
            studyState.learnedStatus = new Array(studyState.allCards.length).fill(undefined);
            studyState.currentBatch = 0;
            studyState.currentIndexInBatch = 0;
            studyState.flipped = false;
            studyState.showExample = false;

            document.removeEventListener('keydown', handleStudyKeys);

        function getLangCodeForSet(setId) {
            const data = loadData();
            const set = data.sets.find(s => s.id === setId);
            if (!set) return 'en-US';
            return getLangCode(set.sourceLang);
        }

        function getTargetLangCode(setId) {
            const data = loadData();
            const set = data.sets.find(s => s.id === setId);
            if (!set) return 'en-US';
            return getLangCode(set.targetLang);

        // ============================================================
        //  FAVORITE TOGGLE
        // ============================================================
        function toggleFavorite(setId, cardId) {
            const data = loadData();
            const set = data.sets.find(s => s.id === setId);
            if (!set) return;
            const card = set.cards.find(c => c.id === cardId);
            if (!card) return;
            card.favorite = !card.favorite;
            saveData(data);
            render();
            showToast(card.favorite ? 'Added to favorites' : 'Removed from favorites', 'info');
        }

        // ============================================================
        //  MOVE CARD (reorder)
        // ============================================================
        function moveCard(setId, cardId, direction) {
            const data = loadData();
            const set = data.sets.find(s => s.id === setId);
            if (!set) return;
            const idx = set.cards.findIndex(c => c.id === cardId);
            if (idx === -1) return;
            const newIdx = idx + direction;
            if (newIdx < 0 || newIdx >= set.cards.length) return;
            const temp = set.cards[idx];
            set.cards[idx] = set.cards[newIdx];
            set.cards[newIdx] = temp;
            saveData(data);
            render();
        }

        // ============================================================
        //  EXPORT CSV
        // ============================================================
        function exportCSV(setId) {
            const data = loadData();
            const set = data.sets.find(s => s.id === setId);
            if (!set) {
                showToast('Set not found.', 'error');
                return;
            }
            const cards = set.cards || [];
            if (cards.length === 0) {
                showToast(t('exportFail'), 'error');
                return;
            }

            let csvContent = '';
            for (const card of cards) {
                const word = escapeCsvField(card.word);
                const meaning = escapeCsvField(card.meaning);
                const example = escapeCsvField(card.example || '');
                const exampleTrans = escapeCsvField(card.exampleTranslation || '');
                csvContent += `${word},${meaning},${example},${exampleTrans}\n`;
            }

            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `${set.name}_cards.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            showToast(t('exportSuccess').replace('{count}', cards.length), 'success');
        }

        function escapeCsvField(field) {
            if (field === undefined || field === null) return '""';
            const str = String(field);
            if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
                return `"${str.replace(/"/g, '""')}"`;
            }
            return str;
        }

        // ============================================================
        //  IMPORT CSV (with drag and drop)

        function openImportCSVModal(setId) {
            openModal(`
                <div class="modal-header">

                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="form-group">
                    <label>${t('importCSV')}</label>
                    <div class="drop-zone" id="csvDropZone">
                        <div class="icon">📄</div>
                        <p>${t('dropOrClick')}</p>
                        <button class="btn btn-primary" onclick="document.getElementById('csvFileInput').click()">${t('chooseFile')}</button>
                        <input type="file" id="csvFileInput" accept=".csv,.txt" style="display:none" />
                    </div>
                    <div class="hint" style="margin-top:12px;">${t('csvHint')}</div>
                </div>
                <div class="form-group">
                    <label>Hoặc nhập trực tiếp</label>
                    <textarea id="modalCsvInput" placeholder="${t('csvPlaceholder')}" style="min-height:150px;"></textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal()">${t('cancel')}</button>
                    <button class="btn btn-primary" onclick="handleImportCsv('${setId}')">${t('import')}</button>
                </div>
            `);

            // Setup drag and drop for CSV
            const dropZone = document.getElementById('csvDropZone');
            const fileInput = document.getElementById('csvFileInput');

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleCSVFile(files[0]);
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (fileInput.files.length > 0) {
                    handleCSVFile(fileInput.files[0]);
                }
            });
        }

        function handleCSVFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const textarea = document.getElementById('modalCsvInput');
                if (textarea) {
                    textarea.value = e.target.result;
                    showToast('File loaded successfully!', 'success');
                }
            };
            reader.readAsText(file);
        }

        function handleImportCsv(setId) {
            const raw = document.getElementById('modalCsvInput').value;
            if (!raw.trim()) {
                showToast('Please enter CSV data or upload a file.', 'error');
                return;
            }

            const lines = raw.split('\n').filter(line => line.trim() !== '');
            let added = 0;
            let errors = 0;
            const data = loadData();
            const set = data.sets.find(s => s.id === setId);
            if (!set) {
                showToast('Set not found.', 'error');
                return;
            }

            for (const line of lines) {
                const parts = parseCSVLine(line);
                if (parts.length < 2) {
                    errors++;
                    continue;
                }
                const word = parts[0].trim();
                const meaning = parts[1].trim();
                if (!word || !meaning) {
                    errors++;
                    continue;
                }
                const example = parts[2] ? parts[2].trim() : '';
                const exampleTranslation = parts[3] ? parts[3].trim() : '';

                set.cards.push({
                    id: generateId(),
                    word,
                    meaning,
                    example,
                    exampleTranslation,
                    favorite: false
                });
                added++;
            }

            saveData(data);
            closeModal();
            showToast(`Imported ${added} cards. ${errors > 0 ? errors + ' lines skipped.' : ''}`, 'success');
            render();
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (inQuotes) {
                    if (ch === '"' && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else if (ch === '"') {
                        inQuotes = false;
                    } else {
                        current += ch;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                    } else if (ch === ',') {
                        result.push(current);
                        current = '';
                    } else {
                        current += ch;
                    }
                }
            }
            result.push(current);
            return result;
        }
