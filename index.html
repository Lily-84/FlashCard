<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlashCard</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app-container" id="app">
        <!-- ===== HEADER ===== -->
        <header class="app-header">
            <div class="brand">
                <h1>📚 FlashCard</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-toggle" id="langToggle" onclick="toggleLanguage()">🇻🇳 Tiếng Việt</button>
                <button class="btn btn-secondary" id="btnExportAllModal" onclick="exportAllData()">📤 Xuất toàn bộ</button>
                <button class="btn btn-secondary" id="btnImportAllModal" onclick="openImportAllModal()">📥 Nhập toàn bộ</button>
                <button class="btn btn-primary" id="btnCreateSet" onclick="openCreateSetModal()">+ Tạo bộ thẻ</button>
            </div>
        </header>

        <!-- ===== MAIN CONTENT ===== -->
        <div id="mainContent">
            <!-- Rendered by JavaScript -->
        </div>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal" id="modalContent">
            <!-- Rendered by JavaScript -->
        </div>
    </div>

    <!-- ===== TOAST CONTAINER ===== -->
    <div class="toast-container" id="toastContainer"></div>
    <script type="module" src="script.js"></script>
</body>
</html>
